<br /><br />
<div

>
  <div class="mx-auto grid h-full max-w-lg grid-cols-4">
    <button

      routerLinkActive="active-tab"
      [routerLinkActiveOptions]="{ exact: true }"
      type="button"
      class="inline-flex flex-col items-center justify-center px-4 hover:bg-gray-200 hover:text-blue-700"
    >

        class="h-5 w-5"
        aria-hidden="true"

    >
      <svg
        class="h-5 w-5"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
