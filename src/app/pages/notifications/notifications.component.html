<main>
  <div class="flex gap-2">
    <label for="notification" class="form-label">Permitir notificaciones</label>
    <div>
      <p-toggleswitch (onChange)="notificationToggle($event)" />
    </div>
  </div>

  <section>
    @if (notifications$ | async; as data) {
      @for (item of data.results; track item.id) {
        <article class="flex items-center gap-1 py-2">
          {{ item.id }}
        </article>
      }
    }
  </section>
</main>
