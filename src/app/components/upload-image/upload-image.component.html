<input
  type="file"
  accept="image/*"
  (change)="handleUploadImage($event)"
  id="image"
  name="image"
  class="hidden"
  #filePost
/>

<div class="grid grid-cols-3 gap-1 md:grid-cols-4">
  @for (image of images$ | async; track image.id) {
    <div class="relative">
      <p-image
        [src]="image.photo"
        alt="image-{{ image.id }}]"
        [preview]="true"
        imageClass="h-40 w-full object-cover"
      />
      <button
        type="button"
        (click)="handleDelete(image.id)"
        class="absolute right-2 top-2 rounded-full bg-red-500 px-2 py-1 text-white hover:bg-red-600"
      >
        <i class="pi pi-trash"></i>
      </button>
    </div>
  }
  <div
    class="flex h-40 w-full items-center justify-center rounded-md border border-gray-200"
  >
    <button
      type="button"
      class="flex flex-col items-center justify-center text-blue-700"
      (click)="filePost.click()"
    >
      <i class="pi pi-camera"></i>
      <span>Subir imagen</span>
    </button>
  </div>
</div>
<p-confirmdialog />
